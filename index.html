<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accès Privé</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Helvetica+Neue:wght@100;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --light-gray: #d2d2d7;
      --mid-gray: #86868b;
      --black: #000000;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      letter-spacing: 0.01em;
      overflow: hidden;
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 1;
      transition: opacity 0.8s ease;
      background: var(--black);
    }
    #login-page.fade-out { opacity: 0; pointer-events: none; }

    .lock-icon {
      width: 48px; height: 48px;
      margin-bottom: 40px;
      opacity: 0;
      animation: rise 1s ease 0.2s forwards;
    }
    .lock-icon svg {
      width: 100%; height: 100%;
      stroke: var(--mid-gray); fill: none;
      stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round;
    }

    .prompt {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--light-gray);
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: rise 1s ease 0.45s forwards;
    }

    .input-wrap {
      position: relative;
      width: clamp(260px, 40vw, 400px);
      opacity: 0;
      animation: rise 1s ease 0.65s forwards;
    }

    #password-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--mid-gray);
      color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 100;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      padding: 10px 0;
      outline: none;
      text-align: center;
      transition: border-color 0.3s ease;
      caret-color: var(--white);
    }
    #password-input::placeholder { color: var(--mid-gray); font-size: 0.85rem; letter-spacing: 0.12em; }
    #password-input:focus { border-bottom-color: var(--white); }
    #password-input.error { border-bottom-color: #ff3b30; animation: shake 0.4s ease; }

    .error-msg {
      position: absolute; bottom: -28px; left: 0; right: 0;
      text-align: center; font-size: 0.72rem; letter-spacing: 0.1em;
      color: #ff3b30; opacity: 0; transition: opacity 0.3s ease;
    }
    .error-msg.visible { opacity: 1; }

    /* ── BUTTONS ── */
    .submit-btn {
      margin-top: 52px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300; font-size: 0.8rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 12px 36px; cursor: pointer;
      opacity: 0;
      animation: rise 1s ease 0.85s forwards;
      transition: background 0.3s ease, border-color 0.3s ease;
      border-radius: 980px;
    }
    .submit-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }
    .submit-btn:active { background: rgba(255,255,255,0.15); }

    /* ── HINTS ── */
    .hints-wrap {
      display: flex; gap: 12px;
      margin-top: 44px;
      opacity: 0;
      animation: rise 1s ease 1.05s forwards;
    }

    .hint-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--mid-gray);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300; font-size: 0.68rem;
      letter-spacing: 0.16em; text-transform: uppercase;
      padding: 8px 20px; cursor: pointer;
      border-radius: 980px;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    .hint-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.3);
      color: var(--light-gray);
    }
    .hint-btn.active {
      border-color: rgba(255,255,255,0.45);
      color: var(--white);
      background: rgba(255,255,255,0.13);
    }

    .hint-display {
      margin-top: 22px;
      min-height: 28px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .hint-display.visible { opacity: 1; transform: translateY(0); }

    .hint-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic; font-weight: 300;
      font-size: 1rem; letter-spacing: 0.08em;
      color: var(--light-gray);
    }

    /* ── CODE BLOCK ── */
    .code-section {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: rise 1s ease 1.25s forwards;
    }

    .code-label {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid-gray);
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .code-label::before,
    .code-label::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    .code-string {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(0.78rem, 1.5vw, 0.98rem);
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 6px;
      padding: 14px 24px;
      cursor: pointer;
      position: relative;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      user-select: all;
      word-break: break-all;
      text-align: center;
      max-width: clamp(280px, 55vw, 560px);
    }
    .code-string:hover {
      color: #ffffff;
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.13);
    }

    .copy-tip {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      transition: color 0.3s ease;
    }
    .copy-tip.copied { color: rgba(255,255,255,0.9); }

    /* ── INNER PAGE ── */
    #inner-page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px;
      background: var(--black);
      opacity: 0; pointer-events: none;
      transition: opacity 1s ease 0.4s;
    }
    #inner-page.visible { opacity: 1; pointer-events: all; }

    .inner-ornament {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, transparent, var(--mid-gray), transparent);
      margin-bottom: 56px;
      transform: scaleY(0);
      transition: transform 1.2s ease 1s;
    }
    #inner-page.visible .inner-ornament { transform: scaleY(1); }

    .inner-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--white); text-align: center;
      line-height: 1.3; letter-spacing: 0.02em;
      opacity: 0; transform: translateY(20px);
      transition: opacity 1s ease 1.2s, transform 1s ease 1.2s;
      max-width: 700px;
    }
    #inner-page.visible .inner-title { opacity: 1; transform: translateY(0); }

    .inner-subtitle {
      margin-top: 28px;
      font-size: 0.9rem; font-weight: 100;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--mid-gray);
      opacity: 0; transition: opacity 1s ease 1.6s;
    }
    #inner-page.visible .inner-subtitle { opacity: 1; }

    .inner-ornament-bottom {
      width: 40px; height: 1px;
      background: var(--mid-gray);
      margin-top: 48px;
      opacity: 0; transition: opacity 1s ease 1.8s;
    }
    #inner-page.visible .inner-ornament-bottom { opacity: 1; }

    /* ── FIREWORKS ── */
    #fireworks-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #fireworks-canvas.active { opacity: 1; }

    /* ── KEYFRAMES ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <p class="prompt">Veuillez entrer le mot de passe</p>

    <div class="input-wrap">
      <input type="password" id="password-input" placeholder="mot de passe" autocomplete="off" spellcheck="false"/>
      <span class="error-msg" id="error-msg">Mot de passe incorrect</span>
    </div>

    <button class="submit-btn" id="submit-btn">Entrer</button>

    <div class="hints-wrap">
      <button class="hint-btn" id="hint-btn-0" onclick="toggleHint(0)">Indice 1</button>
      <button class="hint-btn" id="hint-btn-1" onclick="toggleHint(1)">Indice 2</button>
      <button class="hint-btn" id="hint-btn-2" onclick="toggleHint(2)">Indice 3</button>
    </div>
    <div class="hint-display" id="hint-display">
      <span class="hint-text" id="hint-text"></span>
    </div>

    <!-- CODE BLOCK -->
    <div class="code-section">
      <div class="code-label">clé d'accès</div>
      <div class="code-string" id="code-string" onclick="copyCode()">
        CvqmmqcêDbevnêfjjuKppwbsdbffbttfCeddjbuêtwnpujbgp
      </div>
      <div class="copy-tip" id="copy-tip">cliquer pour copier</div>
    </div>
  </div>

  <!-- FIREWORKS CANVAS -->
  <canvas id="fireworks-canvas"></canvas>

  <!-- INNER PAGE -->
  <div id="inner-page">
    <div class="inner-ornament"></div>
    <h1 class="inner-title">Tu as trouvé la clé.<br><em>Maintenant, regarde sous ton lit, dans le tiroir (cherche bien)</em></h1>
    <p class="inner-subtitle">043</p>
    <div class="inner-ornament-bottom"></div>
  </div>

  <script>
    /* ─── COPY CODE ─── */
    function copyCode() {
      const code = document.getElementById("code-string").textContent.trim();
      const tip  = document.getElementById("copy-tip");
      navigator.clipboard.writeText(code).then(() => {
        tip.textContent = "copié ✓";
        tip.classList.add("copied");
        setTimeout(() => { tip.textContent = "cliquer pour copier"; tip.classList.remove("copied"); }, 2000);
      });
    }

    /* ─── HINTS ─── */
    const HINTS = [
      "7 × 7",
      "Lis-moi de l'extérieur vers le cœur",
      "ê = é"
    ];
    let activeHint = -1;

    function toggleHint(i) {
      const display = document.getElementById("hint-display");
      const text    = document.getElementById("hint-text");
      const btns    = document.querySelectorAll(".hint-btn");

      if (activeHint === i) {
        display.classList.remove("visible");
        btns[i].classList.remove("active");
        activeHint = -1;
      } else {
        btns.forEach(b => b.classList.remove("active"));
        btns[i].classList.add("active");
        if (activeHint !== -1) {
          display.classList.remove("visible");
          setTimeout(() => { text.textContent = HINTS[i]; display.classList.add("visible"); }, 250);
        } else {
          text.textContent = HINTS[i];
          display.classList.add("visible");
        }
        activeHint = i;
      }
    }

    /* ─── PASSWORD ─── */
    const PASSWORD = "Bébé Cadum";
    const input     = document.getElementById("password-input");
    const btn       = document.getElementById("submit-btn");
    const errorMsg  = document.getElementById("error-msg");
    const loginPage = document.getElementById("login-page");
    const innerPage = document.getElementById("inner-page");

    function attempt() {
      if (input.value === PASSWORD) {
        loginPage.classList.add("fade-out");
        setTimeout(() => {
          loginPage.style.display = "none";
          innerPage.classList.add("visible");
          launchFireworks();
        }, 900);
      } else {
        input.classList.add("error");
        errorMsg.classList.add("visible");
        input.value = "";
        setTimeout(() => {
          input.classList.remove("error");
          errorMsg.classList.remove("visible");
        }, 2000);
      }
    }

    btn.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });

    /* ─── FIREWORKS ─── */
    const canvas = document.getElementById("fireworks-canvas");
    const ctx    = canvas.getContext("2d");
    let raf = null, particles = [], rockets = [];

    const PALETTE = [
      "#ffffff","#e8e8e8","#d0d0d0","#b0b0b0",
      "#909090","#c8c8c8","#f0f0f0","#a0a0a0",
      "#ffffff","#ffffff","#d8d8d8"
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const angle = Math.random() * Math.PI * 2, speed = 1.5 + Math.random() * 5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 1.5;
        this.alpha = 1; this.decay = 0.012 + Math.random() * 0.018;
        this.size = 1.5 + Math.random() * 2.5; this.gravity = 0.06; this.trail = [];
      }
      update() {
        this.trail.push({x: this.x, y: this.y, a: this.alpha});
        if (this.trail.length > 6) this.trail.shift();
        this.vy += this.gravity; this.vx *= 0.98;
        this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
      }
      draw() {
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          ctx.beginPath(); ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = t.a * (i / this.trail.length) * 0.4 * this.alpha;
          ctx.fill();
        }
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.globalAlpha = this.alpha; ctx.fill();
      }
      dead() { return this.alpha <= 0; }
    }

    class Ring {
      constructor(x, y, color) { this.x=x; this.y=y; this.color=color; this.r=0; this.maxR=60+Math.random()*60; this.alpha=0.8; }
      update() { this.r += 3; this.alpha -= 0.03; }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.strokeStyle = this.color; ctx.lineWidth = 1.5;
        ctx.globalAlpha = Math.max(0, this.alpha); ctx.stroke();
      }
      dead() { return this.r >= this.maxR || this.alpha <= 0; }
    }

    class Rocket {
      constructor() {
        this.x  = canvas.width  * (0.15 + Math.random() * 0.7);
        this.y  = canvas.height + 10;
        this.tx = canvas.width  * (0.1  + Math.random() * 0.8);
        this.ty = canvas.height * (0.1  + Math.random() * 0.5);
        const dx=this.tx-this.x, dy=this.ty-this.y, dist=Math.hypot(dx,dy), speed=10+Math.random()*6;
        this.vx=(dx/dist)*speed; this.vy=(dy/dist)*speed;
        this.color=PALETTE[Math.floor(Math.random()*PALETTE.length)];
        this.trail=[]; this.exploded=false;
      }
      update() {
        this.trail.push({x:this.x,y:this.y});
        if (this.trail.length>10) this.trail.shift();
        this.x+=this.vx; this.y+=this.vy; this.vy+=0.12;
        if (this.y<=this.ty || Math.hypot(this.x-this.tx,this.y-this.ty)<20) this.explode();
      }
      explode() {
        this.exploded=true;
        const c1=this.color, c2=PALETTE[Math.floor(Math.random()*PALETTE.length)];
        for (let i=0;i<80+Math.floor(Math.random()*80);i++)
          particles.push(new Particle(this.x,this.y,Math.random()<0.5?c1:c2));
        for (let r=0;r<3;r++) particles.push(new Ring(this.x,this.y,this.color));
        for (let s=0;s<16;s++) {
          const a=(s/16)*Math.PI*2, sp=2+Math.random()*4;
          const p=new Particle(this.x,this.y,"#ffffff");
          p.vx=Math.cos(a)*sp; p.vy=Math.sin(a)*sp; p.size=1; p.decay=0.025;
          particles.push(p);
        }
      }
      draw() {
        for (let i=0;i<this.trail.length;i++) {
          const t=this.trail[i]; ctx.beginPath(); ctx.arc(t.x,t.y,2,0,Math.PI*2);
          ctx.fillStyle=this.color; ctx.globalAlpha=(i/this.trail.length)*0.6; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(this.x,this.y,3,0,Math.PI*2);
        ctx.fillStyle="#ffffff"; ctx.globalAlpha=1; ctx.fill();
      }
      dead() { return this.exploded; }
    }

    function loop() {
      ctx.globalAlpha=1; ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      for (let i=rockets.length-1;i>=0;i--) {
        rockets[i].update();
        if (!rockets[i].exploded) rockets[i].draw();
        if (rockets[i].dead()) rockets.splice(i,1);
      }
      for (let i=particles.length-1;i>=0;i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].dead()) particles.splice(i,1);
      }
      ctx.globalAlpha=1; raf=requestAnimationFrame(loop);
    }

    function scheduleRocket(delay) { return setTimeout(()=>rockets.push(new Rocket()),delay); }

    function launchFireworks() {
      resize(); canvas.classList.add("active");
      for (let i=0;i<5;i++) scheduleRocket(i*180);
      let t=1000;
      while (t<6000) { scheduleRocket(t+Math.random()*400); t+=250+Math.random()*350; }
      for (let i=0;i<12;i++) scheduleRocket(6000+i*90);
      loop();
      setTimeout(()=>{ cancelAnimationFrame(raf); canvas.classList.remove("active");
        ctx.clearRect(0,0,canvas.width,canvas.height); particles=[]; rockets=[]; },8500);
    }

    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
